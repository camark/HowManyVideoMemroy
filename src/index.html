<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="dist.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>How Much Video Memory</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <main class="container">
      <h1>🎮 How Much Video Memory?</h1>
      <p class="subtitle">AI Model VRAM Calculator</p>

      <form class="row" id="vram-form">
        <input id="model-input" placeholder="Enter model name (e.g., llama-3-8b)..." />
        <button type="submit">Calculate</button>
      </form>

      <div id="results" class="results-container">
        <p id="result-msg"></p>
        <div id="vram-details" class="hidden">
          <div class="card">
            <h2 id="model-name"></h2>
            <div class="vram-grid">
              <div class="vram-item">
                <span class="label">FP16 (Base)</span>
                <span class="value" id="fp16-value"></span>
              </div>
              <div class="vram-item">
                <span class="label">FP32</span>
                <span class="value" id="fp32-value"></span>
              </div>
              <div class="vram-item">
                <span class="label">INT8</span>
                <span class="value" id="int8-value"></span>
              </div>
              <div class="vram-item">
                <span class="label">INT4</span>
                <span class="value" id="int4-value"></span>
              </div>
              <div class="vram-item">
                <span class="label">FP16 + KV Cache</span>
                <span class="value" id="kv-cache-value"></span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
